<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">
    <title>wednesday</title>
</head>
<body>
    <main>
        <nav class="header">
            <div class="logo">
                <img src="logo.png" alt="bg" height="40">
            </div>

            <div class="list">
                <div>About</div>
                <div>Watch Now</div>
                <div>Actors</div>
                <div>Contact</div>
            </div>

             <i class="fas fa-bars"></i>
        </nav>
        <section class="main-section">
            <div class="section-left">
                <div class="name">
                    <img src="logo.png" alt="name">
                </div>

                <div class="text">
                    <p>Action / Thriller / Drama series directed by Tim Burton,<br>
                    Season 1: 8 Episode</p>
                </div>

                <div class="button">
                    <button class="button1">
                        <b>Play Now</b>
                    </button>

                    <button class="button2">
                        <b>Watch Trailer</b>
                    </button>
                </div>

            </div>

            <div class="section-right">
                <div class="big">
                    <img src="big.png" alt="large image">
                </div>
            </div>
        </section>

        <section class="bottom-section">
            <div class="cards">
            <div class="card">
                <img src="w2.jpg" alt="ep1">
            </div>
            <div class="card">
                <img src="w1.jpg" alt="ep2">
            </div>
            <div class="card">
                <img src="w3.jpg" alt="ep3">
            </div>
            </div>
        </section>
    </main>
</body>
</html>
