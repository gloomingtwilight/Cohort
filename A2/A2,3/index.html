<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insect Showcase</title>
    <link rel="stylesheet" href="style.css">
        <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
     <!-- left --> 
        <div class="left">
            <div class="logo">
                INSECT
            </div>
            <div class="search">
                <i class="fa fa-search"></i>
                <input type="text" placeholder="Search insects...">
            </div>
            <div class="vertical-text">
                Classification
            </div>
            <div class="classification">
                <div class="item">
                    <span>Class:</span>
                    <p>Insecta</p>
                </div>

                <div class="item">
                    <span>Order:</span>
                    <p>Coleoptera</p>
                </div>

                <div class="item">
                    <span>Family:</span>
                    <p>Cerambycidae</p>
                </div>

                <div class="item">
                    <span>Sub-Family:</span>
                    <p>Cerambycinae</p>
                </div>

                <div class="item">
                    <span>Tribe:</span>
                    <p>Callichromatini</p>
                </div>

                <div class="item">
                    <span>Genus:</span>
                    <p>Pachyteria</p>

                </div>
            </div>
        </div>

        <!-- center -->
    <div class="center">
            <div class="glass">
                <img src="bettle2.png" alt="bettle">
            </div>
    </div>

<!-- right -->
    <div class="right">

            <nav>
                <a href="#">Home</a>
                <a href="#">Shop</a>
                <a href="#">About</a>
                <a href="#">Gallery</a>
                <a href="#">Contact</a>
            </nav>
        <div class="content">
                <h1>
                    Pachyteria<br>
                    equestris
                </h1>

                <div class="details">
                    <div>📍Malaysia</div>
                    <div>♂ Male</div>
                    <div>📏 32 mm</div>
                </div>

                <h2>$5.99</h2>

                <div class="options">

                    <label> 
                        <input type="checkbox">
                        View detailed antennae
                    </label>

                    <label> 
                        <input type="checkbox">
                        View underside
                    </label>
                    <button class="btn">
                        Add to Collection
                    </button>
                </div>
            </div>
        </div>
    
    </div>
    

</body>
</html>
